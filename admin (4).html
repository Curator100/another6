<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuition Media — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Baloo+Da+2:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F6F4EE; --surface:#FFFFFF; --ink:#28322F; --ink-soft:#5C6B65;
    --teal:#2F6F62; --teal-deep:#204E44; --gold:#D9A441; --gold-soft:#F0DFB4;
    --line:#E4E0D2; --radius:14px; --shadow:0 4px 20px rgba(40,50,47,0.06);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Hind Siliguri',sans-serif;}
  h1,h2,.display{font-family:'Baloo Da 2',sans-serif;color:var(--teal-deep);margin:0;}
  button,input,select{font-family:inherit;}
  :focus-visible{outline:3px solid var(--gold);outline-offset:2px;}

  /* login */
  #loginScreen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .login-card{
    background:var(--surface);padding:34px 28px;border-radius:18px;box-shadow:var(--shadow);
    width:100%;max-width:360px;
  }
  .login-card h1{font-size:24px;margin-bottom:4px;}
  .login-card p{color:var(--ink-soft);margin:0 0 22px;font-size:14px;}
  .login-card input{
    width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--line);
    background:var(--bg);font-size:15.5px;margin-bottom:12px;
  }
  .login-card button{
    width:100%;padding:12px;border:none;border-radius:10px;background:var(--teal);
    color:#fff;font-weight:600;font-size:15.5px;margin-top:6px;
  }
  .login-err{color:#B5473B;font-size:13.5px;min-height:16px;margin-top:4px;}

  /* dashboard */
  #dashboard{display:none;padding:26px 20px 60px;max-width:1400px;margin:0 auto;}
  .dash-head{
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
    margin-bottom:22px;
  }
  .dash-head h1{font-size:26px;}
  .dash-head .sub{color:var(--ink-soft);font-size:13.5px;margin-top:2px;}
  .logout-btn{
    background:none;border:1.5px solid var(--line);padding:9px 18px;border-radius:999px;
    color:var(--ink-soft);font-size:14px;font-weight:600;
  }
  .stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px;}
  .stat{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:16px 20px;box-shadow:var(--shadow);min-width:140px;
  }
  .stat .num{font-family:'Baloo Da 2';font-size:26px;color:var(--teal-deep);}
  .stat .label{font-size:13px;color:var(--ink-soft);}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .toolbar input{
    flex:1;min-width:180px;padding:10px 14px;border-radius:10px;border:1.5px solid var(--line);
    background:var(--surface);font-size:14.5px;
  }
  .toolbar select{
    padding:10px 14px;border-radius:10px;border:1.5px solid var(--line);
    background:var(--surface);font-size:14px;color:var(--ink);
  }
  .toolbar button{
    padding:10px 18px;border-radius:10px;border:1.5px solid var(--line);
    background:var(--surface);font-size:14px;font-weight:600;color:var(--ink);
  }
  .table-wrap{
    background:var(--surface);border-radius:14px;box-shadow:var(--shadow);
    overflow-x:auto;border:1px solid var(--line);
  }
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:1500px;}
  th,td{padding:11px 13px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap;}
  th{
    background:var(--bg);color:var(--ink-soft);font-weight:600;font-size:12px;
    text-transform:uppercase;letter-spacing:.04em;position:sticky;top:0;
  }
  tr:hover td{background:var(--gold-soft);}
  .pill{
    display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600;
    background:var(--bg);color:var(--teal-deep);border:1px solid var(--line);
  }
  .pill.yes{background:#E4F0E8;color:var(--teal-deep);border-color:#BFDFC9;}
  .pill.no{background:#F5E7E4;color:#B5473B;border-color:#EAC9C2;}
  .pill.done{background:var(--teal);color:#fff;border-color:var(--teal);}
  .pill.pending{background:var(--bg);color:var(--ink-soft);}
  .detail-btn{
    padding:6px 14px;border-radius:8px;border:1.5px solid var(--line);background:var(--surface);
    font-size:12.5px;font-weight:600;color:var(--teal-deep);
  }
  .empty-state{padding:40px 20px;text-align:center;color:var(--ink-soft);}
  .loading-state{padding:40px 20px;text-align:center;color:var(--ink-soft);}

  /* detail drawer */
  .drawer-overlay{
    position:fixed;inset:0;background:rgba(32,40,37,0.5);display:none;
    align-items:center;justify-content:center;z-index:200;padding:16px;
  }
  .drawer-overlay.open{display:flex;}
  .drawer{
    background:var(--surface);border-radius:16px;max-width:640px;width:100%;
    max-height:88vh;overflow-y:auto;padding:24px 24px 30px;box-shadow:var(--shadow);
  }
  .drawer-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
  .drawer-top h2{font-size:20px;}
  .drawer-close{background:none;border:none;font-size:22px;color:var(--ink-soft);line-height:1;padding:4px;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:520px){.detail-grid{grid-template-columns:1fr;}}
  .detail-item{
    background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;
  }
  .detail-item .dl{font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
  .detail-item .dv{font-size:14.5px;font-weight:600;color:var(--ink);}
  .detail-section-title{
    grid-column:1/-1;font-size:12.5px;font-weight:700;color:var(--teal);
    text-transform:uppercase;letter-spacing:.05em;margin-top:10px;margin-bottom:-2px;
  }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h1>Tuition Media</h1>
    <p>Admin Panel</p>
    <input type="text" id="adminUser" placeholder="Username" autocomplete="username">
    <input type="password" id="adminPass" placeholder="Password" autocomplete="current-password">
    <button id="loginBtn">Log In</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div id="dashboard">
  <div class="dash-head">
    <div>
      <h1>Applicants</h1>
      <div class="sub" id="lastUpdated"></div>
    </div>
    <button class="logout-btn" id="logoutBtn">Log Out</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="num" id="statTotal">0</div><div class="label">Total Applicants</div></div>
    <div class="stat"><div class="num" id="statToday">0</div><div class="label">Today</div></div>
    <div class="stat"><div class="num" id="statUnis">0</div><div class="label">Universities</div></div>
    <div class="stat"><div class="num" id="statSurveyDone">0</div><div class="label">Survey Completed</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="searchBox" placeholder="Search by name, number, area, department...">
    <select id="surveyFilter">
      <option value="">All applicants</option>
      <option value="done">Survey completed</option>
      <option value="pending">Survey pending</option>
    </select>
    <button id="refreshBtn">Refresh</button>
    <button id="exportBtn">Export CSV</button>
  </div>

  <div class="table-wrap">
    <table id="dataTable" hidden>
      <thead>
        <tr>
          <th>Name</th><th>WhatsApp</th><th>University</th><th>Year</th>
          <th>Zones</th><th>Gender</th><th>Religion</th><th>Current Tuitions</th>
          <th>Desired Earning</th><th>Applied Tuition</th><th>Survey</th><th>Date</th><th>Details</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="loading-state" id="loadingState">Loading...</div>
    <div class="empty-state" id="emptyState" style="display:none;">No applications yet.</div>
  </div>
</div>

<!-- Detail Drawer -->
<div class="drawer-overlay" id="drawerOverlay">
  <div class="drawer">
    <div class="drawer-top">
      <h2 id="drawerName">Applicant</h2>
      <button class="drawer-close" id="drawerClose" aria-label="Close">&times;</button>
    </div>
    <div class="detail-grid" id="drawerGrid"></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://egsklbezrommbtyjyvak.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVnc2tsYmV6cm9tbWJ0eWp5dmFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MzA1NDYsImV4cCI6MjA5OTEwNjU0Nn0.g2r1gWeBg4RXQTsikure9wQJTXC0aNUw2p2V99-cZl4";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ADMIN_USER = "rayhan";
const ADMIN_PASS = "milliondollar";

const loginScreen = document.getElementById('loginScreen');
const dashboard = document.getElementById('dashboard');
let allRows = [];

// session persists for the tab only
document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('adminPass').addEventListener('keydown', e => { if(e.key==='Enter') tryLogin(); });

function tryLogin(){
  const u = document.getElementById('adminUser').value.trim();
  const p = document.getElementById('adminPass').value;
  if(u === ADMIN_USER && p === ADMIN_PASS){
    sessionStorage.setItem('tm_admin_ok','1');
    showDashboard();
  } else {
    document.getElementById('loginErr').textContent = 'Incorrect username or password.';
  }
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('tm_admin_ok');
  dashboard.style.display = 'none';
  loginScreen.style.display = 'flex';
});

if(sessionStorage.getItem('tm_admin_ok') === '1'){ showDashboard(); }

function showDashboard(){
  loginScreen.style.display = 'none';
  dashboard.style.display = 'block';
  loadData();
}

const SELECT_COLUMNS = `
  name,whatsapp,university,year,zones,zones_sub,applied_tuition_code,created_at,
  gender,department,current_location,teaching_mediums,current_tuition_count,religion,
  is_chittagong_local,min_salary_expected,max_salary_expected,poor_student_min_charge,
  poor_student_discount_tier,transportation_mode,ordered_food_delivery_4months,ssc_gpa,
  self_studied_with_tutor_ssc_hsc,parents_phone,desired_monthly_earning,desired_tuition_count,
  monthly_personal_expense,current_income_source,tuition_main_goal,family_supports_tuition,
  survey_completed
`.replace(/\s+/g,'');

async function loadData(){
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('dataTable').hidden = true;
  document.getElementById('emptyState').style.display = 'none';
  try{
    const { data, error } = await sb.from('tm_applicants')
      .select(SELECT_COLUMNS)
      .order('created_at', { ascending:false });
    if(error) throw error;
    allRows = data || [];
    applyFilters();
    document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleString('en-GB');
  }catch(err){
    document.getElementById('loadingState').textContent = 'Failed to load data.';
    console.error(err);
  }
}

/* ---------- label maps (English display labels for enum/coded values) ---------- */
const LABELS = {
  gender: { male:'Male', female:'Female' },
  religion: { muslim:'Muslim', hindu:'Hindu', buddhist:'Buddhist', christian:'Christian', ethnic_religion:'Ethnic Religion' },
  teaching_mediums: { bangla_medium:'Bangla Medium', national_curriculum:'National Curriculum', british_curriculum:'British Curriculum', arabic_subjects:'Arabic Subjects' },
  transportation_mode: { uber_pathao:'Uber / Pathao', own_vehicle:'Own Bike/Car', rickshaw:'Rickshaw', cng:'CNG', local_bus:'Local Bus' },
  current_income_source: { family_support:'From Family', tuition_income:'Tuition Income', side_business:'Side Business' },
  tuition_main_goal: { personal_expense:'Personal Expenses', family_support:'Support Family', travel:'Travel', chill:'Leisure/Chill', dream_purchase:'Dream Purchase' },
  poor_student_discount_tier: { discount_25:'25% Discount', discount_50:'50% Discount' }
};
function lbl(map, val){ return (LABELS[map] && LABELS[map][val]) || val || ''; }
function lblList(map, arr){ return (Array.isArray(arr) ? arr : []).map(v => lbl(map, v)).join(', '); }
function yn(v){ return v === true ? '<span class="pill yes">Yes</span>' : v === false ? '<span class="pill no">No</span>' : '—'; }
function ynPlain(v){ return v === true ? 'Yes' : v === false ? 'No' : ''; }

function render(rows){
  const tbody = document.getElementById('tableBody');
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('statTotal').textContent = allRows.length;
  const today = new Date().toDateString();
  document.getElementById('statToday').textContent = allRows.filter(r => new Date(r.created_at).toDateString() === today).length;
  document.getElementById('statUnis').textContent = new Set(allRows.map(r=>r.university)).size;
  document.getElementById('statSurveyDone').textContent = allRows.filter(r=>r.survey_completed).length;

  if(!rows.length){
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('dataTable').hidden = true;
    return;
  }
  document.getElementById('dataTable').hidden = false;
  tbody.innerHTML = rows.map((r,i) => `
    <tr>
      <td>${escapeHtml(r.name||'')}</td>
      <td>${escapeHtml(r.whatsapp||'')}</td>
      <td>${escapeHtml(r.university||'')}</td>
      <td>${escapeHtml(r.year||'')}</td>
      <td>${escapeHtml(formatZones(r.zones, r.zones_sub))}</td>
      <td>${escapeHtml(lbl('gender', r.gender))}</td>
      <td>${escapeHtml(lbl('religion', r.religion))}</td>
      <td>${escapeHtml(r.current_tuition_count||'')}</td>
      <td>${r.desired_monthly_earning ? '৳'+r.desired_monthly_earning : ''}</td>
      <td>${r.applied_tuition_code ? `<span class="pill">${escapeHtml(r.applied_tuition_code)}</span>` : '—'}</td>
      <td>${r.survey_completed ? '<span class="pill done">Done</span>' : '<span class="pill pending">Pending</span>'}</td>
      <td>${r.created_at ? new Date(r.created_at).toLocaleString('en-GB') : ''}</td>
      <td><button class="detail-btn" data-idx="${i}">View</button></td>
    </tr>
  `).join('');

  tbody.querySelectorAll('.detail-btn').forEach(btn => {
    btn.addEventListener('click', () => openDrawer(rows[Number(btn.dataset.idx)]));
  });
}

function openDrawer(r){
  document.getElementById('drawerName').textContent = r.name || 'Applicant';
  const items = [
    ['section','Basic Info'],
    ['WhatsApp', r.whatsapp],
    ['University', r.university],
    ['Year', r.year],
    ['Department', r.department],
    ['Current Location', r.current_location],
    ['Zones', formatZones(r.zones, r.zones_sub)],
    ['Parents Phone', r.parents_phone],
    ['Applied Tuition Code', r.applied_tuition_code],
    ['Applied At', r.created_at ? new Date(r.created_at).toLocaleString('en-GB') : ''],

    ['section','Survey — Personal'],
    ['Gender', lbl('gender', r.gender)],
    ['Religion', lbl('religion', r.religion)],
    ['Chittagong Local', ynPlain(r.is_chittagong_local)],
    ['SSC GPA', r.ssc_gpa],
    ['Self-studied w/ Home Tutor (SSC/HSC)', ynPlain(r.self_studied_with_tutor_ssc_hsc)],
    ['Transportation Mode', lbl('transportation_mode', r.transportation_mode)],
    ['Ordered Food Delivery (last 4 months)', ynPlain(r.ordered_food_delivery_4months)],

    ['section','Survey — Teaching Preferences'],
    ['Teaching Mediums', lblList('teaching_mediums', r.teaching_mediums)],
    ['Current Tuition Count', r.current_tuition_count],
    ['Desired Tuition Count', r.desired_tuition_count],
    ['Min Salary Expected', r.min_salary_expected ? '৳'+r.min_salary_expected : ''],
    ['Max Salary Expected', r.max_salary_expected ? '৳'+r.max_salary_expected : ''],
    ['Poor Student — Min Charge', r.poor_student_min_charge ? '৳'+r.poor_student_min_charge : ''],
    ['Poor Student — Discount Tier', lbl('poor_student_discount_tier', r.poor_student_discount_tier)],

    ['section','Survey — Financial & Motivation'],
    ['Desired Monthly Earning', r.desired_monthly_earning ? '৳'+r.desired_monthly_earning : ''],
    ['Monthly Personal Expense', r.monthly_personal_expense ? '৳'+r.monthly_personal_expense : ''],
    ['Current Income Source', lblList('current_income_source', r.current_income_source)],
    ['Main Goal for Tuition', lbl('tuition_main_goal', r.tuition_main_goal)],
    ['Family Supports Tuition', ynPlain(r.family_supports_tuition)],
    ['Survey Completed', ynPlain(r.survey_completed)]
  ];
  const grid = document.getElementById('drawerGrid');
  grid.innerHTML = items.map(([label,val]) => {
    if(label === 'section') return `<div class="detail-section-title">${val}</div>`;
    return `<div class="detail-item"><div class="dl">${escapeHtml(label)}</div><div class="dv">${escapeHtml(val || '—')}</div></div>`;
  }).join('');
  document.getElementById('drawerOverlay').classList.add('open');
}
document.getElementById('drawerClose').addEventListener('click', () => document.getElementById('drawerOverlay').classList.remove('open'));
document.getElementById('drawerOverlay').addEventListener('click', e => {
  if(e.target === document.getElementById('drawerOverlay')) document.getElementById('drawerOverlay').classList.remove('open');
});

function formatZones(zones, zonesSub){
  const main = Array.isArray(zones) ? zones : [];
  const sub = Array.isArray(zonesSub) ? zonesSub : [];
  const parts = main.slice();
  if(sub.length) parts.push(...sub);
  return parts.join(', ');
}

function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function applyFilters(){
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  const surveyVal = document.getElementById('surveyFilter').value;
  let rows = allRows;
  if(surveyVal === 'done') rows = rows.filter(r => r.survey_completed);
  if(surveyVal === 'pending') rows = rows.filter(r => !r.survey_completed);
  if(q){
    rows = rows.filter(r =>
      (r.name||'').toLowerCase().includes(q) ||
      (r.whatsapp||'').toLowerCase().includes(q) ||
      (r.parents_phone||'').toLowerCase().includes(q) ||
      (r.department||'').toLowerCase().includes(q) ||
      (r.current_location||'').toLowerCase().includes(q) ||
      formatZones(r.zones, r.zones_sub).toLowerCase().includes(q) ||
      (r.university||'').toLowerCase().includes(q)
    );
  }
  render(rows);
}

document.getElementById('searchBox').addEventListener('input', applyFilters);
document.getElementById('surveyFilter').addEventListener('change', applyFilters);
document.getElementById('refreshBtn').addEventListener('click', loadData);

document.getElementById('exportBtn').addEventListener('click', () => {
  const header = [
    'Name','WhatsApp','University','Year','Zones','Department','Current Location','Parents Phone',
    'Gender','Religion','Chittagong Local','SSC GPA','Self-studied w/ Tutor','Transportation Mode',
    'Ordered Food Delivery (4mo)','Teaching Mediums','Current Tuition Count','Desired Tuition Count',
    'Min Salary Expected','Max Salary Expected','Poor Student Min Charge','Poor Student Discount Tier',
    'Desired Monthly Earning','Monthly Personal Expense','Current Income Source','Main Goal',
    'Family Supports Tuition','Survey Completed','Applied Tuition Code','Date'
  ];
  const rows = allRows.map(r => [
    r.name, r.whatsapp, r.university, r.year, formatZones(r.zones,r.zones_sub), r.department, r.current_location, r.parents_phone,
    lbl('gender', r.gender), lbl('religion', r.religion), ynPlain(r.is_chittagong_local), r.ssc_gpa, ynPlain(r.self_studied_with_tutor_ssc_hsc),
    lbl('transportation_mode', r.transportation_mode), ynPlain(r.ordered_food_delivery_4months), lblList('teaching_mediums', r.teaching_mediums),
    r.current_tuition_count, r.desired_tuition_count, r.min_salary_expected, r.max_salary_expected, r.poor_student_min_charge,
    lbl('poor_student_discount_tier', r.poor_student_discount_tier), r.desired_monthly_earning, r.monthly_personal_expense,
    lblList('current_income_source', r.current_income_source), lbl('tuition_main_goal', r.tuition_main_goal),
    ynPlain(r.family_supports_tuition), ynPlain(r.survey_completed), r.applied_tuition_code||'', r.created_at
  ]);
  const csv = [header, ...rows].map(row => row.map(v => `"${String(v==null?'':v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'tuition-media-applicants.csv';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
